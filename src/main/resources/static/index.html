<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TigerBoard | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fb 0%, #eef2f7 100%);
        }

        .brand-text {
            color: #f38220;
            letter-spacing: 0.4px;
        }

        .brand-logo {
            width: 108px;
            height: auto;
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .login-card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 12px 32px rgba(17, 17, 17, 0.12);
        }

        .btn-tiger {
            background-color: #f38220;
            border-color: #f38220;
            color: #fff;
        }

        .btn-tiger:hover,
        .btn-tiger:focus {
            background-color: #da6f14;
            border-color: #da6f14;
            color: #fff;
        }
    </style>
</head>
<body>
<main class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card login-card">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <img src="logo.jpg" alt="TigerBoard logo" class="brand-logo" onerror="this.onerror=null;this.src='/logo.jpg';">
                        <h1 class="h3 fw-bold mb-1 brand-text">TigerBoard</h1>
                        <p class="text-muted mb-0">Sign in to continue</p>
                    </div>

                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label for="emailID" class="form-label">RIT Email</label>
                            <input type="email" id="emailID" class="form-control" placeholder="name@rit.edu" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                        </div>

                        <button type="submit" id="loginBtn" class="btn btn-tiger w-100">
                            <span class="btn-label">Login</span>
                            <span class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>

                    <p class="small text-muted text-center mt-4 mb-0">
                        Roles supported: STUDENT, DRIVER, ADMIN
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="position-fixed top-0 end-0 p-3" style="z-index: 1080;">
    <div id="statusToast" class="toast align-items-center text-bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div id="toastMessage" class="toast-body">Message</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        const $loginForm = $("#loginForm");
        const $emailID = $("#emailID");
        const $password = $("#password");
        const $loginBtn = $("#loginBtn");
        const $btnLabel = $loginBtn.find(".btn-label");
        const $spinner = $loginBtn.find(".spinner-border");
        const $toast = $("#statusToast");
        const $toastMessage = $("#toastMessage");

        const toast = new bootstrap.Toast($toast[0], { delay: 2500 });

        function showToast(message, type) {
            const className = type === "success" ? "text-bg-success" : "text-bg-danger";
            $toast.removeClass("text-bg-success text-bg-danger text-bg-dark").addClass(className);
            $toastMessage.text(message);
            toast.show();
        }

        function setLoading(isLoading) {
            $loginBtn.prop("disabled", isLoading);
            $spinner.toggleClass("d-none", !isLoading);
            $btnLabel.text(isLoading ? "Signing in..." : "Login");
        }

        function redirectByRole(role) {
            const routes = {
                STUDENT: "/student-dashboard.html",
                DRIVER: "/driver-dashboard.html",
                ADMIN: "/admin-dashboard.html"
            };

            const destination = routes[role];
            if (!destination) {
                showToast("Unknown role returned by server.", "error");
                return;
            }

            window.location.href = destination;
        }

        $loginForm.on("submit", function (event) {
            event.preventDefault();

            const payload = {
                emailID: ($emailID.val() || "").trim(),
                password: $password.val() || ""
            };

            if (!payload.emailID || !payload.password) {
                showToast("Please enter both email and password.", "error");
                return;
            }

            setLoading(true);

            $.ajax({
                url: "/api/auth/login",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify(payload)
            }).done(function (response) {
                const safeResponse = response || {};

                if (!safeResponse.success) {
                    showToast(safeResponse.message || "Login failed.", "error");
                    return;
                }

                sessionStorage.setItem("currentUser", JSON.stringify(safeResponse));
                showToast("Login successful. Redirecting...", "success");
                setTimeout(function () {
                    redirectByRole(safeResponse.userRole);
                }, 700);
            }).fail(function (xhr) {
                const response = xhr.responseJSON || {};
                showToast(response.message || "Invalid credentials. Please try again.", "error");
            }).always(function () {
                setLoading(false);
            });
        });
    })();
</script>
</body>
</html>
