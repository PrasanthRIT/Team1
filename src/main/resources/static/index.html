<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerBoard</title>
    <style>
        :root {
            --primary-orange: #f38220;
            --primary-blue: #00a2e8;
            --text-black: #111111;
            --text-gray: #7a7a7a;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
        }

        /* Remove Default Bowser Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Set Full height for div-box and add colours*/
        body {
            background-color: var(--bg-color);
            color: var(--text-black);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            background-color: var(--card-bg);
            box-shadow: 0 5px 100px rgba(0, 0, 0, 0.1);
            padding: 1rem 2rem;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            min-height: 96px;
            z-index: 2;
        }

        /* Will change logo for an picture */
        .logo {
            display: flex;
            font-size: 32px;
            font-weight: bold;
            text-decoration: none;
            color: var(--primary-orange);
            align-items: center;
        }

        /* Navigation bar containing buttons for Buses,Students,Drivers and Users */
        .nav-bar {
            display: flex;
            gap: 15px;
        }


        .dropdown {
            position: relative;
            display: inline-block;
        }

        .btn {
            background-color: transparent;
            color: var(--text-black);
            padding: 10px 20px;
            font-size: 16px;
            border: 2px solid transparent;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:hover {
            color: var(--primary-orange);
            background-color: rgba(243, 130, 32, 0.1);
        }

        /* Show dropdown only on hover */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* By default hidden */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--card-bg);
            min-width: 180px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            z-index: 3;
            right: 0;
            border-radius: 8px;
            overflow: hidden;
            padding: 5px 0;
            border: 1px solid var(--border-color);
        }


        .dropdown-content a {
            color: var(--text-black);
            padding: 10px 20px;
            text-decoration: none;
            display: block;
            transition: background-color 0.2s;
        }

        .dropdown-content a:hover {
            background-color: var(--bg-color);
            color: var(--primary-orange);
        }

        /* FlexBox Welcome Box */
        .div-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: var(--primary-orange);
            color: white;
            padding: 20px;
            flex-grow: 1; /* Fill up remaining space */
        }

        .div-box h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            text-shadow: 0 3px 4px rgba(0,0,0,0.1);
        }

        .div-box p {
            max-width: 800px;
            font-size: 1.25rem;
            line-height: 1.5;
        }

    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">TigerBoard</a>
        <div class="nav-bar">
            <div class="dropdown">

                <button class="btn">Buses</button>

                <div class="dropdown-content">
                    <a href="/buses">View Buses</a>
                    <a href="/buses/add">Add Bus</a>
                </div>

                <div class="dropdown">

                    <button class="btn">Students</button>

                    <div class="dropdown-content">
                        <a href="/students">View Students</a>
                        <a href="/students/add">Add Students</a>
                    </div>
            </div>
        </div>
    </header>

    <div class="div-box">
        <h1>Welcome To Tigerboard</h1>
        <p>A Platform designed for commuter management in RIT Dubai that connects students, and drivers to reduce manual coordination using paper based system to an digital system for scheduling, routing and student management.</p>
    </div>

</body>
</html>
