<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TigerBoard View Buses</title>
    <link rel="stylesheet" href="/css/tigerboard-theme.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            background-color: var(--bg-color);
        }

        .navbar {
            background-color: var(--card-bg);
        }

        .tb-brand {
            color: var(--primary-orange);
            font-weight: 700;
            text-decoration: none;
        }

        .btn-tb-primary {
            background-color: var(--primary-orange);
            border-color: var(--primary-orange);
            color: #fff;
        }

        .btn-tb-primary:hover {
            background-color: #e06e00;
            border-color: #e06e00;
            color: #fff;
        }

        .btn-tb-outline {
            border-color: var(--primary-orange);
            color: var(--primary-orange);
        }

        .btn-tb-outline:hover {
            background-color: var(--primary-orange);
            border-color: var(--primary-orange);
            color: #fff;
        }

        .table thead th {
            background-color: #fff2e8;
            color: #7a4a1a;
        }

        .badge-tb-active { background-color: #198754; }
        .badge-tb-inactive { background-color: #6c757d; }
    </style>
</head>
<body>
<nav class="navbar border-bottom shadow-sm">
    <div class="container py-2">
        <a class="tb-brand fs-4" href="/">TigerBoard</a>
        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-outline-secondary" href="/">Home</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h1 class="h4 mb-3">All Buses (Read Only)</h1>

            <form id="searchForm" class="row g-2 mb-3">
                <div class="col-md-8">
                    <input id="searchInput" class="form-control" type="search" placeholder="Search by bus number or route">
                </div>
                <div class="col-md-4 d-flex gap-2">
                    <button type="submit" class="btn btn-tb-primary w-100">Search</button>
                    <button id="clearBtn" type="button" class="btn btn-tb-outline w-100">Clear</button>
                </div>
            </form>

            <div id="messageBox" class="alert alert-danger d-none py-2" role="alert"></div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Bus Number</th>
                        <th>Capacity</th>
                        <th>Route</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody id="busTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>

    // Function to display error in messageBox
    function showError(errorText) {
        var box = $("#messageBox");
        box.removeClass("d-none")
            .text(errorText);
    }

    // hides messagebox if there is no error
    function hideError() {
        $("#messageBox").addClass("d-none").text("");
    }

    function buildRows(busList) {
        var html = "";

        for (var i = 0; i < busList.length; i++) {
            var bus = busList[i];
            var statusClass = bus.isActive ? "badge-tb-active" : "badge-tb-inactive";
            var statusText = bus.isActive ? "Active" : "Inactive";

            html += "<tr>";
            html += "<td>" + (bus.id == null ? "-" : bus.id) + "</td>";
            html += "<td>" + (bus.busNumber || "-") + "</td>";
            html += "<td>" + (bus.capacity == null ? "-" : bus.capacity) + "</td>";
            html += "<td>" + (bus.route || "-") + "</td>";
            html += "<td><span class='badge " + statusClass + "'>" + statusText + "</span></td>";
            html += "</tr>";
        }

        return html;
    }


    function renderTable(busList) {
        if (!Array.isArray(busList) || busList.length === 0) {
            $("#busTableBody").html("<tr><td colspan='5' class='text-center py-4'>No buses found.</td></tr>");
            return;
        }

        $("#busTableBody").html(buildRows(busList));
    }

    function loadAllBuses() {
        hideError();

        $.ajax({url: "/api/buses", method: "GET"}).done(function (data) {
            renderTable(data);
        }).fail(function (requestError) {
            renderTable([]);
            showError("Could not load buses. HTTP " + (requestError.status || "error") + ".");
        });
    }

    function searchBuses(keyword) {
        hideError();

        $.ajax({url: "/api/buses/search?keyword=" + keyword, method: "GET"}).done(function (data) {
            renderTable(data);
        }).fail(function (requestError) {
            renderTable([]);
            showError("Search failed. HTTP " + (requestError.status || "error") + ".");
        });
    }

    // Runs when page is loaded
    $(function () {
        $("#searchForm").on("submit", function (event) {
            event.preventDefault();
            var keyword = $("#searchInput").val().trim();

            if (keyword.length === 0) {
                loadAllBuses();
                return;
            }

            searchBuses(keyword);
        });

        $("#clearBtn").on("click", function () {
            $("#searchInput").val("");
            loadAllBuses();
        });

        loadAllBuses();
    });
</script>
</body>
</html>
