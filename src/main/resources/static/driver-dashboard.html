<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard | TigerBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .page-card { border-radius: 16px; box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,.08); }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-1">Driver Dashboard</h2>
            <p class="text-muted mb-0">View your profile, assigned buses, and students in your buses.</p>
        </div>
        <a href="/index.html" class="btn btn-outline-secondary">Home</a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-lg-4">
            <div class="card page-card">
                <div class="card-body">
                    <h5 class="card-title">My Profile</h5>
                    <div id="profileLoading" class="text-muted">Loading profile...</div>
                    <div id="profileContent" class="d-none"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card page-card">
                <div class="card-body">
                    <h5 class="card-title">My Assigned Buses</h5>
                    <div id="busesLoading" class="text-muted">Loading buses...</div>
                    <div class="table-responsive">
                        <table class="table table-striped d-none" id="busesTable">
                            <thead class="table-dark">
                            <tr>
                                <th>Bus Number</th>
                                <th>Route</th>
                                <th>Capacity</th>
                                <th>Status</th>
                            </tr>
                            </thead>
                            <tbody id="busesTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card page-card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <h5 class="card-title mb-0">Students in My Buses</h5>
                <button class="btn btn-outline-primary" id="refreshBtn">Refresh</button>
            </div>

            <div id="studentsLoading" class="text-muted">Loading students...</div>

            <div class="table-responsive">
                <table class="table table-striped d-none" id="studentsTable">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Location</th>
                        <th>Commute Plan</th>
                        <th>Assigned Bus</th>
                    </tr>
                    </thead>
                    <tbody id="studentsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = "http://localhost:8080/api";
    const driverId = localStorage.getItem("loggedInUserId") || 1;

    function showToast(message, type = "success") {
        const id = "toast-" + Date.now();
        const bgClass =
            type === "success" ? "text-bg-success" :
                type === "error" ? "text-bg-danger" :
                    type === "warning" ? "text-bg-warning" : "text-bg-primary";

        const html = `
            <div id="${id}" class="toast align-items-center ${bgClass} border-0" role="alert">
              <div class="d-flex">
                <div class="toast-body">${message}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
              </div>
            </div>`;
        $("#toastContainer").append(html);
        const toast = new bootstrap.Toast(document.getElementById(id), { delay: 3000 });
        toast.show();
        $(`#${id}`).on("hidden.bs.toast", function() { $(this).remove(); });
    }

    async function loadProfile() {
        try {
            const driver = await $.ajax({ url: `${API_BASE}/drivers/${driverId}`, method: "GET" });
            $("#profileLoading").addClass("d-none");
            $("#profileContent").removeClass("d-none").html(`
                <p class="mb-1"><strong>Name:</strong> ${driver.firstName} ${driver.lastName}</p>
                <p class="mb-1"><strong>Email:</strong> ${driver.emailID}</p>
                <p class="mb-1"><strong>License:</strong> ${driver.licenseNumber}</p>
                <p class="mb-0"><strong>Phone:</strong> ${driver.phoneNumber}</p>
            `);
        } catch {
            $("#profileLoading").text("Could not load profile.");
            showToast("Failed to load driver profile.", "error");
        }
    }

    async function loadAssignedBuses() {
        try {
            const buses = await $.ajax({ url: `${API_BASE}/drivers/${driverId}/buses`, method: "GET" });
            $("#busesLoading").addClass("d-none");
            $("#busesTable").removeClass("d-none");

            if (!buses.length) {
                $("#busesTableBody").html(`<tr><td colspan="4" class="text-center text-muted">No assigned buses.</td></tr>`);
                return;
            }

            $("#busesTableBody").html(buses.map(bus => `
                <tr>
                    <td>${bus.busNumber}</td>
                    <td>${bus.route}</td>
                    <td>${bus.capacity}</td>
                    <td>${bus.isActive ? "Active" : "Inactive"}</td>
                </tr>
            `).join(""));
        } catch {
            $("#busesLoading").text("Could not load buses.");
            showToast("Failed to load assigned buses.", "error");
        }
    }

    async function loadStudents() {
        $("#studentsLoading").removeClass("d-none").text("Loading students...");
        $("#studentsTable").addClass("d-none");

        try {
            const students = await $.ajax({ url: `${API_BASE}/drivers/${driverId}/students`, method: "GET" });
            $("#studentsLoading").addClass("d-none");
            $("#studentsTable").removeClass("d-none");

            if (!students.length) {
                $("#studentsTableBody").html(`<tr><td colspan="6" class="text-center text-muted">No students found for assigned buses.</td></tr>`);
                return;
            }

            $("#studentsTableBody").html(students.map(student => `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.firstName} ${student.lastName}</td>
                    <td>${student.emailID}</td>
                    <td>${student.location ?? ""}</td>
                    <td>${student.commutePlan ?? ""}</td>
                    <td>${student.assignedBusNumber ?? ""}</td>
                </tr>
            `).join(""));
        } catch {
            $("#studentsLoading").text("Could not load students.");
            showToast("Failed to load students in assigned buses.", "error");
        }
    }

    $("#refreshBtn").on("click", function() {
        loadAssignedBuses();
        loadStudents();
        showToast("Dashboard refreshed.", "success");
    });

    $(document).ready(function() {
        loadProfile();
        loadAssignedBuses();
        loadStudents();
    });
</script>
</body>
</html>
