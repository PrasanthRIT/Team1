<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivers | TigerBoard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/tigerboard-theme.css">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <div>
            <h1 class="h3 mb-1">Drivers</h1>
            <p class="text-muted mb-0">Manage driver records using the Driver REST API.</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/index.html" class="btn btn-outline-secondary">Home</a>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#driverModal" onclick="openCreateModal()">
                Add Driver
            </button>
        </div>
    </div>

    <div id="messageBox"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="row g-2 mb-3">
                <div class="col-md-8">
                    <label for="searchInput"></label><input type="text" id="searchInput" class="form-control" placeholder="Search by license number">
                </div>
                <div class="col-md-4 d-flex gap-2">
                    <button class="btn btn-outline-primary w-100" onclick="searchDrivers()">Search</button>
                    <button class="btn btn-outline-secondary w-100" onclick="loadDrivers()">Reset</button>
                </div>
            </div>

            <div id="loadingState" class="text-center py-4 d-none">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 mb-0">Loading drivers...</p>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>License</th>
                        <th>Phone</th>
                        <th>Assigned Buses</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="driversTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="driverModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form id="driverForm">
                <div class="modal-header">
                    <h5 class="modal-title" id="driverModalTitle">Add Driver</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="driverId">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" id="firstName" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" id="lastName" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" id="emailID" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">License Number</label>
                            <input type="text" id="licenseNumber" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input type="text" id="phoneNumber" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Assigned Buses</label>
                            <input type="text" id="assignedBusNumbers" class="form-control" placeholder="Example: S7, D1">
                            <div class="form-text">Separate bus numbers with commas.</div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Driver</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="appToast" class="toast align-items-center text-bg-dark border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastBody">Done</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/drivers.js"></script>
</body>
</html>
